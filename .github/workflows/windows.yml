name: Windows

on:
  push:
    tags:
      - "v*"
    branches:
      - "**"
  pull_request:

permissions:
  contents: write

env:
  DUCKDB_VERSION: v1.4.4
  DUCKDB_ASSET: libduckdb-windows-amd64.zip

jobs:
  matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.extension-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: extension-matrix
        uses: php/php-windows-builder/extension-matrix@v1
        with:
          php-version-list: '8.0, 8.1, 8.2, 8.3, 8.4'
          ts-list: 'nts, ts'
          arch-list: 'x64'

  build:
    needs: matrix
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix.outputs.matrix) }}
    steps:
      - name: Download DuckDB
        shell: pwsh
        run: |
          $version = "${env:DUCKDB_VERSION}"
          $zip = "${env:DUCKDB_ASSET}"
          $root = Join-Path $env:RUNNER_TEMP "duckdb"
          $extract = Join-Path $root "extract"
          New-Item -ItemType Directory -Force $root | Out-Null
          Invoke-WebRequest "https://github.com/duckdb/duckdb/releases/download/$version/$zip" -OutFile "$root\duckdb.zip"
          Expand-Archive "$root\duckdb.zip" -DestinationPath $extract -Force

          $header = Get-ChildItem -Path $extract -Recurse -Filter "duckdb.h" | Select-Object -First 1
          $lib = Get-ChildItem -Path $extract -Recurse -Filter "duckdb.lib" | Select-Object -First 1
          $dll = Get-ChildItem -Path $extract -Recurse -Filter "duckdb.dll" | Select-Object -First 1
          if (-not $header -or -not $lib) { throw "DuckDB headers or library not found in archive" }

          $includeDir = Join-Path $root "include"
          $libDir = Join-Path $root "lib"
          New-Item -ItemType Directory -Force $includeDir | Out-Null
          New-Item -ItemType Directory -Force $libDir | Out-Null
          Copy-Item $header.FullName (Join-Path $includeDir "duckdb.h") -Force
          Copy-Item $lib.FullName (Join-Path $libDir "duckdb.lib") -Force
          if ($dll) { Copy-Item $dll.FullName (Join-Path $libDir "duckdb.dll") -Force }

      - name: Build extension
        uses: php/php-windows-builder/extension@v1
        with:
          php-version: ${{ matrix.php-version }}
          ts: ${{ matrix.ts }}
          arch: ${{ matrix.arch }}
          args: --enable-duckdb --with-duckdb-dir=${{ runner.temp }}\duckdb
          extension-url: https://github.com/${{ github.repository }}
          extension-ref: ${{ github.ref }}
          build-directory: ${{ runner.temp }}\build
          run-tests: false

      - name: Upload artifacts
        if: ${{ github.event_name == 'push' }}
        uses: actions/upload-artifact@v4
        with:
          name: duckdb-${{ matrix.php-version }}-${{ matrix.ts }}-${{ matrix.arch }}
          path: ${{ runner.temp }}\build\artifacts
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') }}
    steps:
      - name: Publish release assets
        uses: php/php-windows-builder/release@v1
        with:
          release: ${{ github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
