name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            duckdb_asset: libduckdb-linux-amd64.zip
          - os: macos-latest
            duckdb_asset: libduckdb-osx-universal.zip
          - os: windows-latest
            duckdb_asset: libduckdb-windows-amd64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: phpize, php-config

      - name: Download DuckDB (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p lib
          curl -L -o /tmp/duckdb.zip "https://github.com/duckdb/duckdb/releases/download/v1.4.4/${{ matrix.duckdb_asset }}"
          unzip -o /tmp/duckdb.zip -d lib

      - name: Download DuckDB (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path lib -Force | Out-Null
          $zip = Join-Path $env:RUNNER_TEMP "duckdb.zip"
          $url = "https://github.com/duckdb/duckdb/releases/download/v1.4.4/${{ matrix.duckdb_asset }}"
          Invoke-WebRequest -Uri $url -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath lib -Force

      - name: Install PHP devel (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $major = php -r "echo PHP_MAJOR_VERSION;"
          $minor = php -r "echo PHP_MINOR_VERSION;"
          $zts = php -r "echo PHP_ZTS ? 'ts' : 'nts';"
          $arch = "x64"
          $mm = "$major.$minor"
          $vc = if ([int]$major -gt 8 -or ([int]$major -eq 8 -and [int]$minor -ge 4)) { "vs17" } else { "vs16" }
          $tsSuffix = if ($zts -eq "nts") { "-nts" } else { "" }
          $zip = Join-Path $env:RUNNER_TEMP "php-devel.zip"
          $url = "https://windows.php.net/downloads/releases/latest/php-devel-pack-$mm$tsSuffix-Win32-$vc-$arch-latest.zip"
          Invoke-WebRequest -Uri $url -OutFile $zip
          $dest = Join-Path $env:RUNNER_TEMP "php-devel"
          Expand-Archive -Path $zip -DestinationPath $dest -Force
          $phpize = Get-ChildItem -Path $dest -Recurse -Filter phpize.bat | Select-Object -First 1
          if (-not $phpize) { throw "phpize.bat not found in devel pack" }
          $phpDevBin = $phpize.Directory.FullName
          $phpDevBin | Out-File -FilePath $env:GITHUB_PATH -Append
          "PHP_DEV_BIN=$phpDevBin" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Setup MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: |
          phpize
          ./configure --enable-duckdb
          make -j"$(nproc 2>/dev/null || sysctl -n hw.ncpu)"

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        working-directory: ${{ github.workspace }}
        run: |
          call "%PHP_DEV_BIN%\phpize.bat"
          call .\configure --enable-duckdb
          nmake

      - name: Locate Extension (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ext = Get-ChildItem -Path $env:GITHUB_WORKSPACE -Recurse -Filter "php_duckdb.dll" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $ext) {
            $ext = Get-ChildItem -Path $env:GITHUB_WORKSPACE -Recurse -Filter "duckdb.dll" -ErrorAction SilentlyContinue |
              Where-Object { $_.FullName -notmatch '[\\/]lib[\\/]' } | Select-Object -First 1
          }
          if (-not $ext) { throw "Built extension DLL not found" }
          "PHP_EXT_DIR=$($ext.Directory.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
          "PHP_EXT_DLL=$($ext.Name)" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Test (Unix)
        if: runner.os != 'Windows'
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/lib
          DYLD_LIBRARY_PATH: ${{ github.workspace }}/lib
        run: make test

      - name: Test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: ${{ github.workspace }}
        run: |
          $env:Path = "$env:GITHUB_WORKSPACE\lib;$env:Path"
          if (-not $env:PHP_EXT_DIR) { throw "PHP_EXT_DIR not set" }
          if (-not $env:PHP_EXT_DLL) { $env:PHP_EXT_DLL = "php_duckdb.dll" }
          $env:TEST_PHP_EXECUTABLE = "php"
          $env:TEST_PHP_ARGS = "-n -d extension_dir=$env:PHP_EXT_DIR -d extension=$env:PHP_EXT_DLL"
          $env:REPORT_EXIT_STATUS = "1"
          php run-tests.php -q
