name: Release PIE Install Check

on:
  workflow_run:
    workflows: ["Windows"]
    types: [completed]

jobs:
  pie-install:
    name: PIE install (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    if: ${{ github.event.workflow_run.event == 'release' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: macos-latest
          - os: windows-latest

    steps:
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: pie, phpize, php-config

      - name: Install DuckDB (Linux)
        if: runner.os == 'Linux'
        run: |
          tmp="$(mktemp -d)"
          curl -L "https://install.duckdb.org/v1.4.4/libduckdb-linux-amd64.zip" -o "$tmp/libduckdb.zip"
          unzip -q "$tmp/libduckdb.zip" -d "$tmp"
          sudo mkdir -p /usr/local/include /usr/local/lib
          sudo install -m 644 "$tmp/duckdb.h" /usr/local/include/duckdb.h
          sudo install -m 755 "$tmp/libduckdb.so" /usr/local/lib/libduckdb.so
          sudo ldconfig

      - name: Install DuckDB (macOS)
        if: runner.os == 'macOS'
        run: |
          tmp="$(mktemp -d)"
          curl -L "https://install.duckdb.org/v1.4.4/libduckdb-osx-universal.zip" -o "$tmp/libduckdb.zip"
          unzip -q "$tmp/libduckdb.zip" -d "$tmp"
          sudo mkdir -p /usr/local/include /usr/local/lib
          sudo install -m 644 "$tmp/duckdb.h" /usr/local/include/duckdb.h
          sudo install -m 755 "$tmp/libduckdb.dylib" /usr/local/lib/libduckdb.dylib

      - name: Install DuckDB (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $vc = "$env:TEMP\vc_redist.x64.exe"
          Invoke-WebRequest "https://aka.ms/vc14/vc_redist.x64.exe" -OutFile $vc
          Start-Process -Wait -FilePath $vc -ArgumentList "/install","/passive","/norestart"

          $version = "v1.4.4"
          $zip = "libduckdb-windows-amd64.zip"
          $dest = "$env:TEMP\duckdb"
          New-Item -ItemType Directory -Force $dest | Out-Null
          Invoke-WebRequest "https://install.duckdb.org/$version/$zip" -OutFile "$dest\libduckdb.zip"
          Expand-Archive "$dest\libduckdb.zip" -DestinationPath $dest -Force
          $target = "C:\Program Files\DuckDB"
          New-Item -ItemType Directory -Force $target | Out-Null
          Copy-Item "$dest\*" $target -Recurse -Force
          [Environment]::SetEnvironmentVariable("Path", $env:Path + ";$target", "User")
          $env:Path += ";$target"

      - name: Install extension (PIE) macOS
        if: runner.os == 'macOS'
        run: pie install saturio/duckdb

      - name: Install extension (PIE) Linux
        if: runner.os == 'Linux'
        run: sudo pie install saturio/duckdb

      - name: Install extension (PIE) Windows
        if: runner.os == 'Windows'
        run: pie install saturio/duckdb --allow-non-interactive-project-install --skip-enable-extension

      - name: Smoke test (PHP, Unix)
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          duckdb_ext="$(find "$HOME/.config/pie" -path "*/modules/duckdb.so" -type f | head -n 1 || true)"
          if [ -z "$duckdb_ext" ]; then
            ext_dir="$(php -r 'echo ini_get("extension_dir");')"
            if [ -f "$ext_dir/duckdb.so" ]; then
              duckdb_ext="$ext_dir/duckdb.so"
            fi
          fi
          if [ -z "$duckdb_ext" ] || [ ! -f "$duckdb_ext" ]; then
            echo "duckdb extension not found" >&2
            exit 1
          fi
          php -d "extension=$duckdb_ext" -r 'new \DuckDB\DuckDB(); echo "ok\n";'

      - name: Smoke test (PHP, Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $iniLine = php --ini | Select-String "Loaded Configuration File" | ForEach-Object { $_.Line }
          $ini = $iniLine -replace 'Loaded Configuration File:\s*', ''
          $ini = $ini.Trim()
          if (-not $ini -or $ini -eq '(none)') {
            $dirLine = php --ini | Select-String "Configuration File \\(php.ini\\) Path" | ForEach-Object { $_.Line }
            $iniDir = ($dirLine -replace 'Configuration File \\(php.ini\\) Path:\s*', '').Trim()
            if (-not $iniDir) { throw "Unable to determine PHP ini path" }
            $ini = Join-Path $iniDir "php.ini"
          }
          if (-not (Test-Path $ini)) { New-Item -ItemType File -Path $ini -Force | Out-Null }
          $content = Get-Content $ini -Raw
          if ($content -notmatch '(?m)^\\s*extension\\s*=\\s*duckdb\\s*$') {
            Add-Content -Path $ini -Value "`r`nextension=duckdb"
          }
          php -r "new \\DuckDB\\DuckDB(); echo \"ok`n\";"
